[platformio]
src_dir = src
lib_dir = lib
include_dir = include
test_dir = test
default_envs = test

# ================================================================
# TESTING ENVIRONMENT
# ================================================================
[env:test]
platform = native
test_framework = unity
build_flags = 
    -Wall
    -Wextra
    -std=c99
    -pedantic
    -coverage
    -DLLP_MAX_PAYLOAD=512
    -DLLP_FRAME_TIMEOUT_MS=2000
lib_deps = 
    throwtheswitch/Unity
extra_scripts = 
    scripts/platformio_coverage.py

# ================================================================
# ARDUINO ENVIRONMENTS
# ================================================================

[env:arduino_uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 9600
upload_speed = 115200
build_flags =
    -Wall
    -DLLP_MAX_PAYLOAD=64
lib_ignore = 
    Unity

